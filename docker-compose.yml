services:
  mongo:
    image: mongo:7
    container_name: hackforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hackforge-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackforge-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/hackforge
      JWT_SECRET: ${JWT_SECRET:-hackforge_jwt_secret_change_in_prod_2026}
      NODE_ENV: production
      CLIENT_ORIGIN: http://localhost:3000
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-HackForge <noreply@hackforge.dev>}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "5000:5000"
    networks:
      - hackforge-net

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackforge-seed
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/hackforge
      JWT_SECRET: hackforge_jwt_secret_change_in_prod_2026
      NODE_ENV: production
    command: node src/seed/seed.js
    networks:
      - hackforge-net
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: hackforge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - hackforge-net

volumes:
  mongo_data:

networks:
  hackforge-net:
    driver: bridge
